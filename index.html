<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYANT TOOLZZ Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;700&display=swap');
        body { background: #0a0a0a; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* Login Screen (Dark Blue Theme) */
        #login-screen { 
            text-align: center; background: rgba(10, 10, 20, 0.8); padding: 40px; border-radius: 20px; 
            border: 1px solid #001f3f; box-shadow: 0 0 20px rgba(0, 31, 63, 0.8);
            backdrop-filter: blur(10px);
        }
        .blue-gradient-text { 
            font-size: 2rem; margin-bottom: 20px;
            background: linear-gradient(90deg, #00d4ff, #005f73, #0a9396);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        input { display: block; width: 250px; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #005f73; background: #050505; color: white; text-align: center; }
        button { padding: 10px 30px; border-radius: 10px; border: none; background: #005f73; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0a9396; box-shadow: 0 0 15px #0a9396; }

        /* Dashboard Screen (Colorful Gradient Theme) */
        #dashboard { display: none; padding: 40px; width: 100%; height: 100%; box-sizing: border-box; overflow-y: auto; }
        h1 { font-size: 3rem; letter-spacing: 3px; background: linear-gradient(90deg, #00d4ff, #ff007a, #7000ff, #00d4ff); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flow 5s linear infinite; text-align: center; }
        @keyframes flow { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; max-width: 900px; margin: 40px auto; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; text-decoration: none; color: white; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; }
        .card:hover { transform: translateY(-10px); border-color: #ff007a; box-shadow: 0 10px 30px rgba(255, 0, 122, 0.2); }
        
        #add-btn { 
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: #ff007a; color: white; font-size: 30px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 0, 122, 0.4); transition: 0.3s;
            display: flex; justify-content: center; align-items: center; line-height: 0;
        }
        #add-btn:hover { transform: scale(1.1) rotate(90deg); }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 class="blue-gradient-text">JAYANT TOOLZZ</h2>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="checkLogin()">LOGIN</button>
    </div>

    <div id="dashboard">
        <h1>MY TOOLS</h1>
        <div class="grid" id="project-grid"></div>
        <button id="add-btn" onclick="addProject()">+</button>
    </div>

    <script>
        function checkLogin() {
            if (document.getElementById('pass').value === "jayant'stools") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                renderProjects();
            } else { alert("Incorrect Password!"); }
        }

        const grid = document.getElementById('project-grid');
        let projects = JSON.parse(localStorage.getItem('myProjects')) || [];

        function renderProjects() {
            grid.innerHTML = '';
            projects.forEach(p => {
                const card = document.createElement('a');
                card.href = p.url; card.target = "_blank"; card.className = 'card';
                card.innerHTML = `<h3>${p.name}</h3>`;
                grid.appendChild(card);
            });
        }

        function addProject() {
            const name = prompt("Project Name:");
            const url = prompt("Project URL:");
            if (name && url) {
                projects.push({ name, url });
                localStorage.setItem('myProjects', JSON.stringify(projects));
                renderProjects();
            }
        }
    </script>
</body>
</html>
