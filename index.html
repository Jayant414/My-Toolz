<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* ... Keep your existing CSS ... */
        .search-bar { margin: 20px 0; width: 300px; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: white; text-align: center; }
        .card { position: relative; }
        .actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; opacity: 0; transition: 0.3s; }
        .card:hover .actions { opacity: 1; }
        .action-btn { background: none; border: none; cursor: pointer; color: white; font-size: 14px; }
    </style>
</head>
<body>

    <h1>MY TOOLS</h1>
    
    <input type="text" id="search" class="search-bar" placeholder="Search projects..." oninput="renderProjects()">

    <div class="grid" id="project-grid"></div>
    <button id="add-btn" onclick="addProject()">+</button>

    <script>
        const grid = document.getElementById('project-grid');
        let projects = JSON.parse(localStorage.getItem('myProjects')) || [];

        function renderProjects() {
            const query = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';
            
            projects.forEach((p, i) => {
                if (p.name.toLowerCase().includes(query)) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="actions">
                            <button class="action-btn" onclick="editProject(${i})">✏️</button>
                            <button class="action-btn" onclick="deleteProject(${i})">🗑️</button>
                        </div>
                        <a href="${p.url}" target="_blank" style="text-decoration:none; color:white;">
                            <h3>${p.name}</h3>
                        </a>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        function editProject(i) {
            const newName = prompt("Enter new name:", projects[i].name);
            if (newName) {
                projects[i].name = newName;
                localStorage.setItem('myProjects', JSON.stringify(projects));
                renderProjects();
            }
        }

        function deleteProject(i) {
            if (confirm("Delete this tool?")) {
                projects.splice(i, 1);
                localStorage.setItem('myProjects', JSON.stringify(projects));
                renderProjects();
            }
        }

        // ... Keep your existing addProject() and login functions ...
    </script>
</body>
</html>
